<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Environment</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
    }

    .container {
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    gap: 10px;
    padding: 10px;
    }

        /* Right column split into 2 parts */
    .side-panel {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 10px;
    }

    .problem {
        grid-column: 1 / 3;
        background: #ffffff;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .editor {
        background: #1e1e1e;
        color: #ffffff;
        padding: 10px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
    }

    textarea {
        flex: 1;
        width: 100%;
        resize: none;
        border: none;
        outline: none;
        background: #1e1e1e;
        color: #00ffcc;
        font-family: monospace;
        font-size: 14px;
        
    }
    
    textarea::selection {
         background: rgba(255, 0, 0, 0.4);
    }

        .hints {
        background: #ffffff;
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 0 5px rgba(0,0,0,0.1);
        overflow-y: auto;
        font-size: 14px;
    }

        /* NEW: Results panel */
    .results {
        background: #ffffff;
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 0 5px rgba(0,0,0,0.1);
        overflow-y: auto;
        font-size: 14px;
        color: #333;
    }

    .buttons {
        grid-column: 1 / 3;
        text-align: center;
    }

    button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    .submit {
        background-color: #28a745;
        color: white;
    }

    .refresh {
        background-color: #007bff;
        color: white;
    }

    button:hover {
        opacity: 0.85;
    }

  .spoiler {
    background-color: #444;
    color: white;   
    border-radius: 5px;
    padding: 8px;
    margin: 5px 0;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
}

.spoiler:hover {
    background-color: #555;
}

.spoiler.revealed {
    background-color: #222;
    color: #fff;
}

.locked {
    background-color: #888;
    cursor: not-allowed;
    opacity: 0.6;
}

.locked:hover {
    background-color: #888;
}

#error_highlight_css
.editor.error {
    border: 2px solid red;
    animation: flash 0.5s ease;
}


@keyframes flash {
    0% { background-color: #2a0000; }
    100% { background-color: #1e1e1e; }
}
</style>
</head>


<body onload="newProblem()">

<div class="container">

    <!-- Problem Area -->
    <div class="problem">
        <h2>Άσκησεις/Προβλήματα</h2>
        <p id="problemText"></p>
    </div>

    <!-- Code Editor -->
    <div class="editor">
        <h3>Code Editor</h3>
        <textarea id="codeArea" placeholder="// Γράψε τον κώδικα σου εδώ..."></textarea>
    </div>

    <div class="side-panel">

        <div class="hints">
            <h3>Βοήθειες</h3>
            <div id="hintsList"></div>
        </div>

        <div class="results">
            <h3>Ανατροφοδότηση</h3>
            <pre id="outputArea">Δεν έχει υποβληθεί κάτι ακόμη.</pre>
        </div>

    </div>

    <!-- Buttons -->
    <div class="buttons">
        <button class="submit" onclick="submitCode()">Submit</button>
        <button class="refresh" onclick="newProblem()">New Problem</button>
    </div>

</div>
<script src="solutions.js"></script>
<script src="submitCode.js"></script>
<script src="newProblem.js"></script>

</body>
</html>
